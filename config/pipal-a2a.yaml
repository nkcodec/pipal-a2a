# PiPal-A2A Configuration
#
# Each pi terminal has its own identity.
# Copy this file and change identity for each terminal.
#
# Terminal 1: name: planner,     skills: [planning, delegation]
# Terminal 2: name: backend,     skills: [code-generation, backend-implementation]
# Terminal 3: name: frontend,    skills: [frontend-implementation]
# Terminal 4: name: reviewer,    skills: [security-review, code-review]

# Shared state rendezvous URL
# First terminal auto-starts the server here, others connect to it.
sharedState: http://localhost:5000

# apiKey moved to .env (PIPAL_API_KEY) — per-project, not in git
role: planner

# MemPalace — agent memory and knowledge graph
# Per karpathy-clean-code: Config activates, not defines.
# Default: disabled. Enable and set your own wing name.
mempalace:
  enabled: false
  wing: "wing_a2a"    # change to your project wing
  sharedRoom: "shared"
