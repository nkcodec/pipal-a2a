# PiPal-A2A Agent Configuration
# Each agent has skills that define what it can do

agents:
  - name: orchestrator
    description: Plans tasks and delegates to workers
    endpoint: http://localhost:4001
    skills:
      - id: planning
        name: Planning
        description: Create execution plans from task descriptions
      - id: delegation
        name: Delegation
        description: Route tasks to appropriate agents

  - name: backend-worker
    description: Implements backend code
    endpoint: http://localhost:4002
    skills:
      - id: code-generation
        name: Code Generation
        description: Generate code from specifications
      - id: backend-implementation
        name: Backend Implementation
        description: Implement server-side logic

  - name: frontend-worker
    description: Implements frontend code
    endpoint: http://localhost:4003
    skills:
      - id: frontend-implementation
        name: Frontend Implementation
        description: Implement UI components and interactions

  - name: security-reviewer
    description: Reviews code for security issues
    endpoint: http://localhost:4004
    skills:
      - id: security-review
        name: Security Review
        description: Identify security vulnerabilities
      - id: code-review
        name: Code Review
        description: General code quality review

# Default port for dashboard/events
port: 4001