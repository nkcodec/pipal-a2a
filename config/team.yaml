# PiPal-A2A Team Configuration
# karpathy-clean-code: Config activates, not defines. Router uses this.
# Core (Task lifecycle) is frozen. This file is infrastructure.
#
# Usage: /pipal-role <name>   (e.g. /pipal-role backend)
# Or:    /pipal-role          (lists available roles)
#
# Workflows: Add workflow definitions here. When a delegate task matches
# a workflow name, the entire workflow runs automatically (PreHook pattern).

team:
    roles:
        planner:
            description: Architecture, reasoning, multi-step planning, delegation.
            skills: [planning, delegation]
            tags: [plan, architecture, design]
            skillGuidelines:
                - "Follow karpathy-clean-code: ship smallest correct core, config activates not defines, no abstractions for single-use code."
                - "Before delegating: question intent. Is there a simpler approach? YAGNI."
                - "After every delegation: scrutinize the result before accepting. Cite or it didn't happen."
                - "When a bug is found: debug-mantra — reproduce, trace, falsify, breadcrumb."
                - "After fixing a bug: write post-mortem — root cause, mechanism, why it slipped through."
                - "When reporting status to leadership: use management-talk — translate for audience, shape for channel."

        backend:
            description: Implementation, code generation, API development.
            skills: [code-generation, backend-implementation]
            tags: [node.js, express, api, backend]
            skillGuidelines:
                - "Follow karpathy-clean-code: core frozen, infrastructure implements, config activates."
                - "Simplicity first: minimum code, no speculative abstractions. YAGNI."
                - "Surgical changes: touch only what you must."
                - "If you find a bug: debug-mantra — reproduce reliably, trace the fail path, falsify hypotheses."

        frontend:
            description: UI implementation, styling, user-facing code.
            skills: [frontend-implementation]
            tags: [react, css, tailwind, ui]
            skillGuidelines:
                - "Follow karpathy-clean-code: simplicity first, no speculative abstractions."
                - "Ship smallest correct core. Let CSS libraries be extensions, not core."
                - "If you find a bug: debug-mantra — reproduce, trace, falsify, breadcrumb."

        data:
            description: Data pipelines, analysis, embeddings, storage.
            skills: [data-processing, embeddings]
            tags: [data, chromadb, sqlite, kafka, spark, pandas]
            skillGuidelines:
                - "Follow karpathy-clean-code: data models are core (frozen), pipelines are infrastructure."
                - "No premature optimization. Profile first."

        security:
            description: Security audits, vulnerability scanning, hardening.
            skills: [security-audit]
            tags: [security, audit, hardening]
            skillGuidelines:
                - "Use scrutinize mindset: outsider perspective, trace actual code paths, cite specific lines."
                - "Distinguish claim from verification. Found injection risk is not the same as verified exploit works."
                - "No rubber stamps. If nothing found, state what you checked."

        reviewer:
            description: Code review, quality assurance, testing.
            skills: [code-review]
            tags: [review, testing, quality]
            skillGuidelines:
                - "Use scrutinize workflow: intent then trace then verify then report."
                - "Check karpathy layer rules: core should be frozen, infrastructure implements, config activates."
                - "Cite or it didn't happen. Reference specific file paths and line numbers."
                - "No flattery, no hedging. State findings directly."
                - "One simpler-alternative pass is mandatory: could this whole change be avoided?"

# ─────────────────────────────────────────────────────────────────
# Workflow Definitions (PreHook activation)
# karpathy-clean-code: Config activates, not defines.
# Workflow = structured plan for planner — defines step sequencing.
# ─────────────────────────────────────────────────────────────────
workflows:
    btc-trading:
        name: "BTC Trading System"
        description: "Full trading system with backend, security, frontend"
        working_dir: "btc-trading"
        steps:
            - role: backend
              task: |
                  Build a Node.js/Express trading API in btc-trading/backend/
                  Requirements:
                  - REST endpoints: GET /ticker, GET /orderbook, POST /order, GET /balance
                  - Support mock data for Binance, Coinbase, Kraken (no real API keys needed)
                  - Use in-memory storage for orders and balances
                  - Include: server.js, routes/, models/, package.json
                  - No authentication needed for demo
            - role: security
              task: |
                  Security audit for btc-trading/backend/
                  Requirements:
                  - Check for injection vulnerabilities in order handling
                  - Verify input validation on all endpoints
                  - Review for SSRF in exchange API calls
                  - Report findings in btc-trading/security-report.md
              depends_on: [backend]
            - role: data
              task: |
                  Market data feed integration for btc-trading/
                  Requirements:
                  - Create a simple price simulator with configurable price ranges
                  - Support BTC, ETH, SOL trading pairs
                  - Emit price updates via SSE every 5 seconds
                  - Store in btc-trading/data/price-simulator.js
              depends_on: [backend]
            - role: frontend
              task: |
                  Trading UI for btc-trading/frontend/
                  Requirements:
                  - React with basic CSS (no Tailwind)
                  - Show live price ticker from data feed
                  - Order form: buy/sell BTC, ETH, SOL
                  - Display order history
                  - Connect to backend at localhost:3000
              depends_on: [backend, data]
            - role: reviewer
              task: |
                  Final code review for btc-trading/
                  Requirements:
                  - Verify all files in btc-trading/ compile without errors
                  - Check package.json has valid scripts: start, test
                  - Ensure no hardcoded secrets
                  - Report status in btc-trading/review-report.md
              depends_on: [frontend]

    todo-app:
        name: "Todo App"
        description: "Simple todo app with backend API and frontend UI"
        working_dir: "todo-app"
        steps:
            - role: backend
              task: |
                  Build REST API for todo-app in todo-app/backend/
                  Requirements:
                  - Endpoints: GET /todos, POST /todos, PUT /todos/:id, DELETE /todos/:id
                  - Node.js/Express with in-memory storage
                  - Include: server.js, package.json
            - role: frontend
              task: |
                  Todo UI for todo-app/frontend/
                  Requirements:
                  - React with basic CSS
                  - Add, complete, delete todos
                  - Connect to backend at localhost:3000
              depends_on: [backend]
